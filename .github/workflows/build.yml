name: Build & Release
on:
  push:
    tags: ['v*']
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: libcakegame.so
          - os: macos-latest
            artifact: libcakegame.dylib
          - os: windows-latest
            artifact: cakegame.dll
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Rename artifact
        shell: bash
        run: |
          cp target/release/libcakegame* ${{ matrix.artifact }} 2>/dev/null || true
          cp target/release/cakegame.dll ${{ matrix.artifact }} 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            libcakegame.so
            libcakegame.dylib
            cakegame.dll
