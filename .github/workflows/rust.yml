name: Rust Build & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: libcakegame.so
            asset_name: libcakegame-linux-amd64.so
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cakegame.dll
            asset_name: cakegame-windows-amd64.dll
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: libcakegame.dylib
            asset_name: libcakegame-macos-amd64.dylib
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: libcakegame.dylib
            asset_name: libcakegame-macos-arm64.dylib

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --verbose

    - name: Rename artifact (Linux)
      if: runner.os == 'Linux'
      run: |
        cp target/${{ matrix.target }}/release/libcakegame.so ${{ matrix.artifact }}

    - name: Rename artifact (Windows)
      if: runner.os == 'Windows'
      run: |
        cp target/${{ matrix.target }}/release/cakegame.dll ${{ matrix.artifact }}

    - name: Rename artifact (macOS)
      if: runner.os == 'macOS'
      run: |
        cp target/${{ matrix.target }}/release/libcakegame.dylib ${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.artifact }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Run tests
      run: cargo test --verbose

  release:
    name: Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
